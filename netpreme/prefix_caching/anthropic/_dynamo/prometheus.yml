global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Dynamo frontend metrics (TTFT, KV hit rate, request rate, token counts)
  - job_name: dynamo_frontend
    static_configs:
      - targets: ["localhost:8000"]
    metrics_path: /metrics

  # Custom KV transfer exporter (CPU↔GPU bytes, bandwidth)
  - job_name: vllm_kv_exporter
    static_configs:
      - targets: ["localhost:9091"]
